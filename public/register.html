<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNUST Lost and Found Register</title>
<link rel="stylesheet" href="Login.css">
</head>
<body>
  <div class="login-container">
    <h1>Create your account</h1>
    <form id="registerForm" class="login-form">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Full name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required minlength="8">

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required minlength="8">

      <button type="submit">Register</button>
    </form>
    <p><a href="Login.html">Already have an account? Log in</a></p>
    <p id="registerError" style="color:red;"></p>
  </div>
  <script src="register.js"></script>
</body>
</html>
